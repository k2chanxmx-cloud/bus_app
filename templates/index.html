<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>待たせたな…</title>

  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#050000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="待たせたな…" />
  <link rel="apple-touch-icon" href="/static/icon-512.png" />

  <style>
    :root {
      --text: #fff7ed;
      --gold: #ffd166;
      --orange: #ff8a00;
      --fire: #ff3b00;
      --dark: rgba(8, 0, 0, 0.88);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;

      background: #050000;

      color: var(--text);

      overflow-x: hidden;

      position: relative;
    }

    body::before {
      content: "";

      position: fixed;

      inset: 0;

      background:
        linear-gradient(
          rgba(0,0,0,0.30),
          rgba(0,0,0,0.78)
        ),

        url("/static/fire-bg.png");

      background-size: auto 100%;

      background-position: center bottom;

      background-repeat: no-repeat;

      opacity: 0.96;

      z-index: -2;
    }

    body::after {
      content: "";

      position: fixed;

      inset: 0;

      background:

        radial-gradient(
          circle at 50% 12%,
          rgba(255,120,0,0.22),
          transparent 34%
        ),

        radial-gradient(
          circle at 50% 70%,
          rgba(255,72,0,0.12),
          transparent 42%
        ),

        linear-gradient(
          rgba(0,0,0,0.08),
          rgba(0,0,0,0.55)
        );

      z-index: -1;

      pointer-events: none;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding:
        calc(env(safe-area-inset-top) + 18px)
        18px
        calc(env(safe-area-inset-bottom) + 24px);
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .header-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      background: #000;

      box-shadow:
        0 0 18px rgba(255, 72, 0, 0.75);
    }

    .small {
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;

      text-shadow:
        0 0 10px var(--fire);
    }

    h1 {
      margin: 2px 0 0;

      font-size: 33px;

      color: #fff7ed;

      text-shadow:
        0 0 8px var(--orange),
        0 0 18px var(--fire);
    }

    .card {
      padding: 18px;

      border-radius: 30px;

      background: rgba(0,0,0,0.78);

      border:
        1px solid rgba(255, 121, 0, 0.55);

      box-shadow:
        0 0 24px rgba(255, 72, 0, 0.45),
        inset 0 0 22px rgba(255, 72, 0, 0.08);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;

      margin-bottom: 16px;
    }

    .tab {
      border:
        1px solid rgba(255, 122, 0, 0.45);

      border-radius: 22px;

      padding: 15px 8px;

      font-size: 16px;
      font-weight: 900;

      color: #d6c7b5;

      background:
        rgba(8, 8, 8, 0.82);

      cursor: pointer;

      box-shadow:
        inset 0 0 14px rgba(255, 90, 0, 0.08);
    }

    .tab.active {
      color: #fff7ed;

      background:
        linear-gradient(
          135deg,
          rgba(120,20,0,0.95),
          rgba(20,0,0,0.96)
        );

      border-color: var(--orange);

      box-shadow:
        0 0 16px rgba(255, 95, 0, 0.9),
        inset 0 0 18px rgba(255, 150, 0, 0.18);

      text-shadow:
        0 0 8px var(--fire);
    }

    .info,
    .next-box,
    .bus-card,
    .detail-content {
      background: rgba(5, 0, 0, 0.86);

      border:
        1px solid rgba(255, 116, 0, 0.62);

      box-shadow:
        0 0 16px rgba(255, 72, 0, 0.38),
        inset 0 0 16px rgba(255, 72, 0, 0.08);
    }

    .info {
      padding: 17px;
      border-radius: 24px;
    }

    .stop {
      color: var(--gold);
      font-size: 14px;
      font-weight: 900;
    }

    .direction {
      margin-top: 5px;

      font-size: 28px;
      font-weight: 900;

      color: var(--gold);

      text-shadow:
        0 0 12px var(--fire);
    }

    .now {
      margin-top: 8px;

      font-size: 13px;
      font-weight: 800;

      color: #fff1d6;
    }

    .fire-divider {
      width: 100%;
      height: 34px;

      object-fit: contain;

      margin: 12px 0 4px;

      opacity: 0.85;

      display: block;
    }

    .next-box {
      margin-top: 16px;

      padding: 20px;

      border-radius: 26px;

      position: relative;

      overflow: hidden;
    }

    .next-box::after {
      content: "";

      position: absolute;

      right: -30px;
      bottom: -40px;

      width: 170px;
      height: 170px;

      background:
        radial-gradient(
          circle,
          rgba(255,95,0,0.35),
          transparent 65%
        );

      pointer-events: none;
    }

    .next-label {
      color: var(--gold);

      font-size: 14px;
      font-weight: 900;

      text-shadow:
        0 0 8px var(--fire);
    }

    .next-time {
      margin-top: 4px;

      font-size: 64px;
      line-height: 1;

      font-weight: 900;

      letter-spacing: -0.06em;

      color: #fff7ed;

      text-shadow:
        0 0 10px var(--orange),
        0 0 24px var(--fire);
    }

    .remaining {
      margin-top: 14px;

      font-size: 26px;
      font-weight: 900;

      color: var(--gold);

      text-shadow:
        0 0 8px var(--orange),
        0 0 18px var(--fire);
    }

    .count {
      margin-top: 8px;

      font-size: 13px;
      font-weight: 800;

      color: #fff1d6;
    }

    .list {
      margin-top: 18px;

      display: grid;

      gap: 12px;
    }

    .bus-card {
      border-radius: 24px;
      overflow: hidden;
    }

    .bus-card:first-child {
      border-color: var(--orange);

      box-shadow:
        0 0 18px rgba(255, 72, 0, 0.85),
        inset 0 0 18px rgba(255, 72, 0, 0.13);
    }

    .bus-header {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 17px;

      cursor: pointer;
    }

    .bus-time {
      font-size: 34px;
      font-weight: 900;

      color: #fff7ed;

      text-shadow:
        0 0 10px var(--fire);
    }

    .bus-note {
      display: flex;
      align-items: center;
      gap: 8px;

      color: var(--gold);

      font-size: 15px;
      font-weight: 900;

      white-space: nowrap;

      text-shadow:
        0 0 8px var(--fire);
    }

    .badge {
      padding: 6px 12px;

      border-radius: 12px;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #7f1d1d
        );

      color: #fff;

      font-size: 14px;
      font-weight: 900;

      box-shadow:
        0 0 12px var(--fire);
    }

    .chevron {
      color: var(--gold);

      font-size: 20px;
      font-weight: 900;
    }

    .detail {
      max-height: 0;
      overflow: hidden;

      transition:
        max-height 0.3s ease;
    }

    .detail.open {
      max-height: 260px;
    }

    .detail-content {
      margin: 0 14px 14px;

      padding: 18px;

      border-radius: 20px;
    }

    .detail-title {
      text-align: center;

      color: var(--gold);

      font-size: 18px;
      font-weight: 900;

      margin-bottom: 14px;

      text-shadow:
        0 0 10px var(--fire);
    }

    .detail-row {
      display: grid;

      grid-template-columns: 86px 1fr;

      gap: 10px;

      align-items: center;

      margin-bottom: 11px;

      font-size: 15px;
    }

    .detail-key {
      color: var(--gold);

      font-weight: 900;

      white-space: nowrap;
    }

    .detail-value {
      color: #fff7ed;

      font-weight: 900;

      text-align: right;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .goenji-text {
      color: #ff5a1f;

      text-shadow:
        0 0 10px var(--fire);
    }

    .reload {
      width: 100%;

      margin-top: 16px;

      border:
        1px solid rgba(255, 156, 0, 0.82);

      border-radius: 22px;

      padding: 16px;

      color: var(--gold);

      background:
        linear-gradient(
          135deg,
          rgba(130,20,0,0.96),
          rgba(10,0,0,0.96)
        );

      font-size: 17px;
      font-weight: 900;

      box-shadow:
        0 0 18px rgba(255, 72, 0, 0.75),
        inset 0 0 16px rgba(255, 150, 0, 0.16);

      text-shadow:
        0 0 8px var(--fire);
    }

    .loading {
      text-align: center;

      color: #fff1d6;

      font-weight: 800;

      opacity: 0.8;
    }
  </style>
</head>

<body>
<main class="app">

  <div class="app-header">
    <img class="header-icon" src="/static/icon-512.png" alt="豪炎寺">
    <div>
      <div class="small">亀21 リアルタイム接近情報</div>
      <h1>豪炎寺バス</h1>
    </div>
  </div>

  <section class="card">

    <div class="tabs">
      <button id="btn-kameido" class="tab active" onclick="changeDirection('kameido')">
        亀戸駅方面
      </button>

      <button id="btn-toyocho" class="tab" onclick="changeDirection('toyocho')">
        東陽町方面
      </button>
    </div>

    <div class="info">
      <div id="stop" class="stop">竪川大橋北詰</div>
      <div id="direction" class="direction">亀戸駅方面</div>
      <div id="now" class="now">読み込み中...</div>
    </div>

    <img class="fire-divider" src="/static/divider-fire.png" alt="">

    <div class="next-box">
      <div class="next-label">🔥 いちばん近いバス</div>

      <div class="next-main">
        <div id="nextTime" class="next-time">--:--</div>
        <div id="remaining" class="remaining">--</div>
      </div>

      <div id="count" class="count">--</div>
    </div>

    <div id="list" class="list"></div>

    <button class="reload" onclick="loadBuses()">
      ⟳ 更新する（ファイヤー！）
    </button>

  </section>

</main>

<script>
let currentDirection = "kameido";

function getDayTypeLabel(dayType) {
  if (dayType === "weekday") return "平日";
  if (dayType === "saturday") return "土曜";
  if (dayType === "holiday") return "日曜/祝日";
  return "";
}

function calcRemainingMinutes(busTime, nowTime) {
  const [bh, bm] = busTime.split(":").map(Number);
  const [nh, nm] = nowTime.split(":").map(Number);
  return (bh * 60 + bm) - (nh * 60 + nm);
}

function getGoenjiRemainText(diff) {
  if (diff <= 0) return "まもなく豪炎寺";
  return `あと ${diff} 分豪炎寺`;
}

function changeDirection(direction) {
  currentDirection = direction;

  document.getElementById("btn-kameido").classList.toggle("active", direction === "kameido");
  document.getElementById("btn-toyocho").classList.toggle("active", direction === "toyocho");

  loadBuses();
}

async function loadRealtime(detailId) {
  const container = document.getElementById(`${detailId}-content`);

  container.innerHTML = `<div class="loading">接近情報取得中...</div>`;

  try {
    const res = await fetch(`/api/realtime/${currentDirection}`);
    const data = await res.json();

    container.innerHTML = `
      <div class="detail-title">🔥 接近情報</div>

      <div class="detail-row">
        <div class="detail-key">現在地</div>
        <div class="detail-value">${data.current_place}</div>
      </div>

      <div class="detail-row">
        <div class="detail-key">停留所数</div>
        <div class="detail-value">${data.stop_count}</div>
      </div>

      <div class="detail-row">
        <div class="detail-key">豪炎寺</div>
        <div class="detail-value goenji-text">🔥 ${data.goenji}</div>
      </div>

      <div class="detail-row">
        <div class="detail-key">車両番号</div>
        <div class="detail-value">${data.vehicle_id}</div>
      </div>
    `;
  } catch (e) {
    container.innerHTML = `
      <div class="detail-title">接近情報</div>
      <div class="detail-row">
        <div class="detail-key">状態</div>
        <div class="detail-value">通信エラー</div>
      </div>
    `;
  }
}

function toggleDetail(id) {
  const detail = document.getElementById(id);
  const arrow = document.getElementById(`${id}-arrow`);

  detail.classList.toggle("open");

  if (arrow) {
    arrow.textContent = detail.classList.contains("open") ? "⌃" : "⌄";
  }

  if (detail.classList.contains("open")) {
    loadRealtime(id);
  }
}

async function loadBuses() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  try {
    const res = await fetch(`/api/buses/${currentDirection}`);
    const data = await res.json();

    document.getElementById("stop").textContent = data.stop;
    document.getElementById("direction").textContent = data.direction;
    document.getElementById("now").textContent =
      `現在 ${data.now} / ${getDayTypeLabel(data.day_type)}ダイヤ`;

    if (!data.buses || data.buses.length === 0) {
      document.getElementById("nextTime").textContent = "終了";
      document.getElementById("remaining").textContent = "--";
      document.getElementById("count").textContent = "今日の残りの便はないぞ";
      return;
    }

    const firstBus = data.buses[0];
    const firstDiff = calcRemainingMinutes(firstBus, data.now);

    document.getElementById("nextTime").textContent = firstBus;
    document.getElementById("remaining").textContent = getGoenjiRemainText(firstDiff);
    document.getElementById("count").textContent =
      `このあと ${data.buses.length} 本あります`;

    data.buses.forEach((time, index) => {
      const diff = calcRemainingMinutes(time, data.now);
      const detailId = `detail-${index}`;
      const card = document.createElement("div");

      card.className = "bus-card";

      card.innerHTML = `
        <div class="bus-header" onclick="toggleDetail('${detailId}')">
          <div class="bus-time">${time}</div>

          <div class="bus-note">
            ${index === 0 ? '<span class="badge">次発</span>' : getGoenjiRemainText(diff)}
            <span id="${detailId}-arrow" class="chevron">⌄</span>
          </div>
        </div>

        <div id="${detailId}" class="detail">
          <div id="${detailId}-content" class="detail-content">
            <div class="loading">タップで接近情報取得</div>
          </div>
        </div>
      `;

      list.appendChild(card);
    });

  } catch (e) {
    document.getElementById("nextTime").textContent = "エラー";
    document.getElementById("remaining").textContent = "--";
    document.getElementById("count").textContent = "時刻表を取得できなかった";
  }
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/service-worker.js");
  });
}

loadBuses();
setInterval(loadBuses, 60000);
</script>

</body>
</html>
