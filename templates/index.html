<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>豪炎寺バス</title>

  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#f4f6fb" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="豪炎寺バス" />

  <link rel="apple-touch-icon" href="/static/icon-512.png" />

  <style>
    :root {
      --bg: #f4f6fb;
      --card: rgba(255,255,255,0.88);
      --text: #1f2937;
      --sub: #6b7280;
      --main: #2563eb;
      --main-soft: #dbeafe;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 18px 40px rgba(15,23,42,0.12);
      --fire: #ef4444;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top left, #e0f2fe 0, transparent 34%),
        radial-gradient(circle at bottom right, #ede9fe 0, transparent 32%),
        var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 24px);
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .header-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(15,23,42,0.18);
      background: #fff;
    }

    .small {
      color: var(--sub);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 2px 0 0;
      font-size: 31px;
      line-height: 1.15;
      letter-spacing: -0.04em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 18px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab {
      border: 0;
      border-radius: 18px;
      padding: 13px 10px;
      font-size: 15px;
      font-weight: 800;
      color: var(--sub);
      background: #eef2f7;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      background: var(--main);
      box-shadow: 0 10px 20px rgba(37,99,235,0.25);
    }

    .info {
      margin-top: 14px;
      padding: 14px;
      border-radius: 22px;
      background: var(--main-soft);
    }

    .stop {
      font-size: 14px;
      color: var(--sub);
      font-weight: 800;
    }

    .direction {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .now {
      margin-top: 6px;
      color: var(--sub);
      font-size: 13px;
      font-weight: 700;
    }

    .next-box {
      margin-top: 16px;
      padding: 18px;
      border-radius: 24px;
      background: #111827;
      color: #fff;
    }

    .next-label {
      font-size: 13px;
      opacity: 0.72;
      font-weight: 800;
    }

    .next-main {
      display: flex;
      align-items: baseline;
      gap: 18px;
      flex-wrap: wrap;
    }

    .next-time {
      margin-top: 2px;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .remaining {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 900;
      color: #60a5fa;
    }

    .count {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.72;
      font-weight: 700;
    }

    .list {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .bus-card {
      background: #fff;
      border-radius: 22px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .bus-card:first-child {
      border: 2px solid var(--main);
    }

    .bus-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      cursor: pointer;
    }

    .bus-time {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .bus-note {
      font-size: 14px;
      font-weight: 800;
      color: var(--sub);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .badge {
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      background: var(--main);
    }

    .chevron {
      color: var(--sub);
      font-size: 18px;
      font-weight: 900;
    }

    .detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #f9fafb;
    }

    .detail.open {
      max-height: 260px;
    }

    .detail-content {
      margin: 0 14px 14px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
    }

    .detail-title {
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .detail-key {
      color: var(--sub);
      font-weight: 800;
      white-space: nowrap;
    }

    .detail-value {
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goenji-text {
      color: var(--fire);
      font-weight: 900;
      white-space: nowrap;
    }

    .reload {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 20px;
      padding: 15px;
      font-size: 16px;
      font-weight: 900;
      color: var(--main);
      background: #fff;
      box-shadow: 0 8px 18px rgba(15,23,42,0.08);
      cursor: pointer;
    }

    .loading {
      opacity: 0.6;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>

<body>
<main class="app">

  <div class="app-header">
    <img class="header-icon" src="/static/icon-512.png" alt="豪炎寺">
    <div>
      <div class="small">竪川大橋北詰</div>
      <h1>次のバス</h1>
    </div>
  </div>

  <section class="card">

    <div class="tabs">
      <button id="btn-kameido" class="tab active" onclick="changeDirection('kameido')">
        亀戸駅方面
      </button>

      <button id="btn-toyocho" class="tab" onclick="changeDirection('toyocho')">
        東陽町方面
      </button>
    </div>

    <div class="info">
      <div id="stop" class="stop">竪川大橋北詰</div>
      <div id="direction" class="direction">亀戸駅方面</div>
      <div id="now" class="now">読み込み中...</div>
    </div>

    <div class="next-box">
      <div class="next-label">いちばん近いバス</div>

      <div class="next-main">
        <div id="nextTime" class="next-time">--:--</div>
        <div id="remaining" class="remaining">--</div>
      </div>

      <div id="count" class="count">--</div>
    </div>

    <div id="list" class="list"></div>

    <button class="reload" onclick="loadBuses()">
      ⟳ 更新する
    </button>

  </section>

</main>

<script>
let currentDirection = "kameido";

function getDayTypeLabel(dayType) {
  if (dayType === "weekday") return "平日";
  if (dayType === "saturday") return "土曜";
  if (dayType === "holiday") return "日曜/祝日";
  return "";
}

function calcRemainingMinutes(busTime, nowTime) {
  const [bh, bm] = busTime.split(":").map(Number);
  const [nh, nm] = nowTime.split(":").map(Number);
  return (bh * 60 + bm) - (nh * 60 + nm);
}

function getRemainingText(diff) {
  if (diff <= 0) {
    return "まもなく発車";
  }
  return `あと ${diff} 分`;
}

function changeDirection(direction) {
  currentDirection = direction;

  document
    .getElementById("btn-kameido")
    .classList.toggle("active", direction === "kameido");

  document
    .getElementById("btn-toyocho")
    .classList.toggle("active", direction === "toyocho");

  loadBuses();
}

async function loadRealtime(detailId) {
  const container = document.getElementById(`${detailId}-content`);

  container.innerHTML = `
    <div class="loading">
      接近情報取得中...
    </div>
  `;

  try {
    const res = await fetch(`/api/realtime/${currentDirection}`);
    const data = await res.json();

    container.innerHTML = `
      <div class="detail-title">
        接近情報
      </div>

      <div class="detail-row">
        <div class="detail-key">現在地</div>
        <div class="detail-value">
          接近中
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">停留所数</div>
        <div class="detail-value">
          ${data.stop_count}
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">豪炎寺</div>
        <div class="detail-value goenji-text">
          🔥 ${data.goenji}
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">車両番号</div>
        <div class="detail-value">
          ${data.vehicle_id}
        </div>
      </div>
    `;

  } catch (e) {
    container.innerHTML = `
      <div class="detail-title">
        接近情報
      </div>

      <div class="detail-row">
        <div class="detail-key">状態</div>
        <div class="detail-value">
          通信エラー
        </div>
      </div>
    `;
  }
}

function toggleDetail(id) {
  const detail = document.getElementById(id);
  const arrow = document.getElementById(`${id}-arrow`);

  detail.classList.toggle("open");

  if (arrow) {
    arrow.textContent = detail.classList.contains("open") ? "⌃" : "⌄";
  }

  if (detail.classList.contains("open")) {
    loadRealtime(id);
  }
}

async function loadBuses() {
  const list = document.getElementById("list");

  list.innerHTML = "";

  try {
    const res = await fetch(`/api/buses/${currentDirection}`);
    const data = await res.json();

    document.getElementById("stop").textContent = data.stop;
    document.getElementById("direction").textContent = data.direction;

    document.getElementById("now").textContent =
      `現在 ${data.now} / ${getDayTypeLabel(data.day_type)}ダイヤ`;

    if (!data.buses || data.buses.length === 0) {
      document.getElementById("nextTime").textContent = "終了";
      document.getElementById("remaining").textContent = "--";
      document.getElementById("count").textContent = "本日の残りの便はありません";

      list.innerHTML = `
        <div class="bus-card">
          <div class="bus-header">
            本日のバスは終了しました
          </div>
        </div>
      `;
      return;
    }

    const firstBus = data.buses[0];
    const firstDiff = calcRemainingMinutes(firstBus, data.now);

    document.getElementById("nextTime").textContent = firstBus;
    document.getElementById("remaining").textContent = getRemainingText(firstDiff);
    document.getElementById("count").textContent =
      `このあと ${data.buses.length} 本あります`;

    data.buses.forEach((time, index) => {
      const diff = calcRemainingMinutes(time, data.now);
      const detailId = `detail-${index}`;
      const card = document.createElement("div");

      card.className = "bus-card";

      card.innerHTML = `
        <div class="bus-header" onclick="toggleDetail('${detailId}')">
          <div class="bus-time">
            ${time}
          </div>

          <div class="bus-note">
            ${
              index === 0
              ? '<span class="badge">次発</span>'
              : getRemainingText(diff)
            }

            <span id="${detailId}-arrow" class="chevron">
              ⌄
            </span>
          </div>
        </div>

        <div id="${detailId}" class="detail">
          <div id="${detailId}-content" class="detail-content">
            <div class="loading">
              タップで接近情報取得
            </div>
          </div>
        </div>
      `;

      list.appendChild(card);
    });

  } catch (e) {
    document.getElementById("nextTime").textContent = "エラー";
    document.getElementById("remaining").textContent = "--";
    document.getElementById("count").textContent = "時刻表を取得できませんでした";

    list.innerHTML = `
      <div class="bus-card">
        <div class="bus-header">
          通信エラーです
        </div>
      </div>
    `;
  }
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/service-worker.js");
  });
}

loadBuses();
setInterval(loadBuses, 60000);
</script>

</body>
</html>
