<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>豪炎寺バス</title>

  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#050000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="豪炎寺バス" />
  <link rel="apple-touch-icon" href="/static/icon-512.png" />

  <style>
    :root {
      --text: #fff7ed;
      --sub: #fbbf24;
      --fire: #ff4b00;
      --fire2: #ff9f1c;
      --gold: #ffd166;
      --dark: rgba(5, 0, 0, 0.82);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.68), rgba(0,0,0,0.88)),
        url("/static/fire-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 24px);
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .header-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow:
        0 0 12px rgba(255, 85, 0, 0.75),
        0 8px 22px rgba(0, 0, 0, 0.6);
      background: #000;
    }

    .small {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 0 8px rgba(255, 85, 0, 0.8);
    }

    h1 {
      margin: 2px 0 0;
      font-size: 31px;
      line-height: 1.15;
      letter-spacing: -0.04em;
      color: #fff7ed;
      text-shadow:
        0 0 8px #ff4b00,
        0 0 18px rgba(255, 0, 0, 0.8);
    }

    .card {
      position: relative;
      padding: 18px;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(rgba(10,0,0,0.78), rgba(0,0,0,0.88));
      box-shadow:
        0 0 22px rgba(255, 68, 0, 0.35),
        0 18px 40px rgba(0,0,0,0.55);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/static/frame-simple.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.9;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid rgba(255, 106, 0, 0.45);
      border-radius: 18px;
      padding: 13px 10px;
      font-size: 15px;
      font-weight: 900;
      color: #c9c0b6;
      background: rgba(10, 10, 10, 0.72);
      cursor: pointer;
      box-shadow: inset 0 0 12px rgba(255, 88, 0, 0.08);
    }

    .tab.active {
      color: #fff7ed;
      background:
        linear-gradient(135deg, rgba(140, 22, 0, 0.95), rgba(35, 0, 0, 0.9));
      border-color: var(--fire2);
      box-shadow:
        0 0 14px rgba(255, 72, 0, 0.8),
        inset 0 0 16px rgba(255, 150, 0, 0.22);
      text-shadow: 0 0 8px #ff4b00;
    }

    .info {
      position: relative;
      margin-top: 14px;
      padding: 16px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(10,0,0,0.84), rgba(0,0,0,0.9));
      border: 1px solid rgba(255, 111, 0, 0.5);
      box-shadow: 0 0 14px rgba(255, 72, 0, 0.35);
    }

    .info::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/static/frame-fire-top-right.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.72;
    }

    .info > * {
      position: relative;
      z-index: 1;
    }

    .stop {
      font-size: 14px;
      color: #fbbf24;
      font-weight: 900;
    }

    .direction {
      margin-top: 5px;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #ffd166;
      text-shadow:
        0 0 8px #ff4b00,
        0 0 16px rgba(255, 50, 0, 0.7);
    }

    .now {
      margin-top: 7px;
      color: #fef3c7;
      font-size: 13px;
      font-weight: 800;
    }

    .fire-divider {
      width: 100%;
      height: 34px;
      object-fit: contain;
      margin: 10px 0 4px;
      opacity: 0.88;
    }

    .next-box {
      position: relative;
      margin-top: 16px;
      padding: 20px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(12,0,0,0.9), rgba(0,0,0,0.92));
      border: 1px solid rgba(255, 111, 0, 0.48);
      box-shadow: 0 0 18px rgba(255, 72, 0, 0.48);
    }

    .next-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/static/frame-fire-right.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.82;
    }

    .next-box > * {
      position: relative;
      z-index: 1;
    }

    .next-label {
      font-size: 13px;
      color: #fbbf24;
      font-weight: 900;
      text-shadow: 0 0 8px rgba(255, 72, 0, 0.8);
    }

    .next-main {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    .next-time {
      margin-top: 2px;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #fff7ed;
      text-shadow:
        0 0 8px #ff9f1c,
        0 0 18px #ff4b00,
        0 0 28px rgba(255, 0, 0, 0.9);
    }

    .remaining {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 900;
      color: #ffb703;
      text-shadow:
        0 0 8px #ff4b00,
        0 0 18px rgba(255, 0, 0, 0.8);
    }

    .count {
      margin-top: 4px;
      font-size: 13px;
      color: #fef3c7;
      font-weight: 800;
    }

    .list {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .bus-card {
      background: rgba(5, 0, 0, 0.82);
      border-radius: 22px;
      border: 1px solid rgba(255, 106, 0, 0.45);
      overflow: hidden;
      box-shadow:
        inset 0 0 12px rgba(255, 77, 0, 0.08),
        0 0 12px rgba(255, 77, 0, 0.22);
    }

    .bus-card:first-child {
      border-color: #ff9f1c;
      box-shadow:
        0 0 16px rgba(255, 72, 0, 0.7),
        inset 0 0 18px rgba(255, 77, 0, 0.15);
    }

    .bus-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      cursor: pointer;
    }

    .bus-time {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff7ed;
      text-shadow: 0 0 8px rgba(255, 72, 0, 0.65);
    }

    .bus-note {
      font-size: 14px;
      font-weight: 900;
      color: #ffb703;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255, 72, 0, 0.7);
    }

    .badge {
      border-radius: 9px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 900;
      color: #fff7ed;
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
      box-shadow: 0 0 10px rgba(255, 72, 0, 0.9);
    }

    .chevron {
      color: #ffb703;
      font-size: 18px;
      font-weight: 900;
    }

    .detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0, 0, 0, 0.42);
    }

    .detail.open {
      max-height: 280px;
    }

    .detail-content {
      position: relative;
      margin: 0 14px 14px;
      padding: 18px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(20,0,0,0.86), rgba(0,0,0,0.9));
      border: 1px solid rgba(255, 106, 0, 0.45);
    }

    .detail-content::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/static/frame-fire-left.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.76;
    }

    .detail-content > * {
      position: relative;
      z-index: 1;
    }

    .detail-title {
      text-align: center;
      font-size: 17px;
      color: #ffd166;
      font-weight: 900;
      margin-bottom: 14px;
      text-shadow: 0 0 9px #ff4b00;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .detail-key {
      color: #fbbf24;
      font-weight: 900;
      white-space: nowrap;
    }

    .detail-value {
      font-weight: 900;
      text-align: right;
      color: #fff7ed;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goenji-text {
      color: #ff4b00;
      font-weight: 900;
      white-space: nowrap;
      text-shadow:
        0 0 6px #ff7a00,
        0 0 14px #ff2200;
    }

    .reload {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 20px;
      padding: 16px;
      font-size: 17px;
      font-weight: 900;
      color: #ffd166;
      background:
        linear-gradient(135deg, rgba(120, 18, 0, 0.96), rgba(20, 0, 0, 0.96));
      border: 1px solid rgba(255, 150, 0, 0.8);
      box-shadow:
        0 0 14px rgba(255, 72, 0, 0.75),
        inset 0 0 16px rgba(255, 150, 0, 0.18);
      cursor: pointer;
      text-shadow: 0 0 8px #ff4b00;
    }

    .loading {
      opacity: 0.78;
      font-weight: 800;
      text-align: center;
      color: #fef3c7;
    }
  </style>
</head>

<body>
<main class="app">

  <div class="app-header">
    <img class="header-icon" src="/static/icon-512.png" alt="豪炎寺">
    <div>
      <div class="small">亀21 リアルタイム接近情報</div>
      <h1>豪炎寺バス</h1>
    </div>
  </div>

  <section class="card">

    <div class="tabs">
      <button id="btn-kameido" class="tab active" onclick="changeDirection('kameido')">
        🔥 亀戸駅方面
      </button>

      <button id="btn-toyocho" class="tab" onclick="changeDirection('toyocho')">
        🚌 東陽町方面
      </button>
    </div>

    <div class="info">
      <div id="stop" class="stop">竪川大橋北詰</div>
      <div id="direction" class="direction">亀戸駅方面</div>
      <div id="now" class="now">読み込み中...</div>
    </div>

    <img class="fire-divider" src="/static/divider-fire.png" alt="">

    <div class="next-box">
      <div class="next-label">🔥 いちばん近いバス</div>

      <div class="next-main">
        <div id="nextTime" class="next-time">--:--</div>
        <div id="remaining" class="remaining">--</div>
      </div>

      <div id="count" class="count">--</div>
    </div>

    <div id="list" class="list"></div>

    <button class="reload" onclick="loadBuses()">
      ⟳ 更新する（ファイヤー！）
    </button>

  </section>

</main>

<script>
let currentDirection = "kameido";

function getDayTypeLabel(dayType) {
  if (dayType === "weekday") return "平日";
  if (dayType === "saturday") return "土曜";
  if (dayType === "holiday") return "日曜/祝日";
  return "";
}

function calcRemainingMinutes(busTime, nowTime) {
  const [bh, bm] = busTime.split(":").map(Number);
  const [nh, nm] = nowTime.split(":").map(Number);
  return (bh * 60 + bm) - (nh * 60 + nm);
}

function getRemainingText(diff) {
  if (diff <= 0) return "まもなく発車";
  return `あと ${diff} 分`;
}

function getGoenjiRemainText(diff) {
  if (diff <= 0) return "まもなく豪炎寺";
  return `あと ${diff} 分豪炎寺 🔥`;
}

function changeDirection(direction) {
  currentDirection = direction;

  document
    .getElementById("btn-kameido")
    .classList.toggle("active", direction === "kameido");

  document
    .getElementById("btn-toyocho")
    .classList.toggle("active", direction === "toyocho");

  loadBuses();
}

async function loadRealtime(detailId) {
  const container = document.getElementById(`${detailId}-content`);

  container.innerHTML = `
    <div class="loading">
      接近情報取得中...
    </div>
  `;

  try {
    const res = await fetch(`/api/realtime/${currentDirection}`);
    const data = await res.json();

    container.innerHTML = `
      <div class="detail-title">
        🔥 接近情報
      </div>

      <div class="detail-row">
        <div class="detail-key">現在地</div>
        <div class="detail-value">
          ${data.current_place}
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">停留所数</div>
        <div class="detail-value">
          ${data.stop_count}
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">豪炎寺</div>
        <div class="detail-value goenji-text">
          🔥 ${data.goenji}
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-key">車両番号</div>
        <div class="detail-value">
          ${data.vehicle_id}
        </div>
      </div>
    `;

  } catch (e) {
    container.innerHTML = `
      <div class="detail-title">
        接近情報
      </div>

      <div class="detail-row">
        <div class="detail-key">状態</div>
        <div class="detail-value">
          通信エラー
        </div>
      </div>
    `;
  }
}

function toggleDetail(id) {
  const detail = document.getElementById(id);
  const arrow = document.getElementById(`${id}-arrow`);

  detail.classList.toggle("open");

  if (arrow) {
    arrow.textContent = detail.classList.contains("open") ? "⌃" : "⌄";
  }

  if (detail.classList.contains("open")) {
    loadRealtime(id);
  }
}

async function loadBuses() {
  const list = document.getElementById("list");

  list.innerHTML = "";

  try {
    const res = await fetch(`/api/buses/${currentDirection}`);
    const data = await res.json();

    document.getElementById("stop").textContent = data.stop;
    document.getElementById("direction").textContent = data.direction;

    document.getElementById("now").textContent =
      `現在 ${data.now} / ${getDayTypeLabel(data.day_type)}ダイヤ`;

    if (!data.buses || data.buses.length === 0) {
      document.getElementById("nextTime").textContent = "終了";
      document.getElementById("remaining").textContent = "--";
      document.getElementById("count").textContent = "本日の残りの便はありません";

      list.innerHTML = `
        <div class="bus-card">
          <div class="bus-header">
            本日のバスは終了しました
          </div>
        </div>
      `;
      return;
    }

    const firstBus = data.buses[0];
    const firstDiff = calcRemainingMinutes(firstBus, data.now);

    document.getElementById("nextTime").textContent = firstBus;
    document.getElementById("remaining").textContent = getGoenjiRemainText(firstDiff);
    document.getElementById("count").textContent =
      `このあと ${data.buses.length} 本あります`;

    data.buses.forEach((time, index) => {
      const diff = calcRemainingMinutes(time, data.now);
      const detailId = `detail-${index}`;
      const card = document.createElement("div");

      card.className = "bus-card";

      card.innerHTML = `
        <div class="bus-header" onclick="toggleDetail('${detailId}')">
          <div class="bus-time">
            ${time}
          </div>

          <div class="bus-note">
            ${
              index === 0
              ? '<span class="badge">次発</span>'
              : getGoenjiRemainText(diff)
            }

            <span id="${detailId}-arrow" class="chevron">
              ⌄
            </span>
          </div>
        </div>

        <div id="${detailId}" class="detail">
          <div id="${detailId}-content" class="detail-content">
            <div class="loading">
              タップで接近情報取得
            </div>
          </div>
        </div>
      `;

      list.appendChild(card);
    });

  } catch (e) {
    document.getElementById("nextTime").textContent = "エラー";
    document.getElementById("remaining").textContent = "--";
    document.getElementById("count").textContent = "時刻表を取得できませんでした";

    list.innerHTML = `
      <div class="bus-card">
        <div class="bus-header">
          通信エラーです
        </div>
      </div>
    `;
  }
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/service-worker.js");
  });
}

loadBuses();
setInterval(loadBuses, 60000);
</script>

</body>
</html>
